<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Digital | Jamil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #090e17; 
            --card-bg: rgba(30, 41, 59, 0.45); 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            perspective: 1200px; 
            position: relative;
            overflow: hidden; 
        }

        /* ----------------------------------------- */
        /* [ANIMASI CSS] - Gerakan Melayang Awan     */
        /* ----------------------------------------- */
        @keyframes float-1 {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -50px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        @keyframes float-2 {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-40px, 40px) scale(1.15); }
            66% { transform: translate(30px, -30px) scale(0.85); }
            100% { transform: translate(0, 0) scale(1); }
        }

        @keyframes float-3 {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(50px, 30px) scale(1.1) rotate(15deg); }
            100% { transform: translate(0, 0) scale(1) rotate(0deg); }
        }

        /* ----------------------------------------- */
        /* [GRAFIS BG 1] - Awan Cahaya Bergerak      */
        /* ----------------------------------------- */
        .bg-blobs {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .blob-1 {
            position: absolute;
            top: -10%; left: -20%;
            width: 350px; height: 350px;
            background: #06b6d4; 
            filter: blur(120px);
            opacity: 0.35;
            border-radius: 50%;
            animation: float-1 15s ease-in-out infinite;
        }

        .blob-2 {
            position: absolute;
            bottom: -15%; right: -10%;
            width: 400px; height: 400px;
            background: #d946ef; 
            filter: blur(130px);
            opacity: 0.25;
            border-radius: 50%;
            animation: float-2 18s ease-in-out infinite;
        }

        .blob-3 {
            position: absolute;
            top: 40%; left: 60%;
            width: 250px; height: 250px;
            background: #3b82f6; 
            filter: blur(100px);
            opacity: 0.2;
            border-radius: 50%;
            animation: float-3 20s ease-in-out infinite;
        }

        /* ----------------------------------------- */
        /* [GRAFIS BG 2] - Pola Jaringan (Dot Grid)  */
        /* ----------------------------------------- */
        .bg-pattern {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 24px 24px;
            z-index: 1;
            pointer-events: none;
        }

        /* Kartu Profil Utama (Glassmorphism) */
        .profile-card {
            width: 100%;
            max-width: 380px;
            background: var(--card-bg);
            border-radius: 28px; 
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            z-index: 10; 
            position: relative;
            transform-style: preserve-3d;
            will-change: transform;
            transition: transform 0.15s ease-out; 
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #64748b, #0f172a);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            font-weight: 700;
            color: #f1f5f9;
            letter-spacing: -2px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            position: relative;
            border: 2px solid rgba(255,255,255,0.15);
        }
        
        .avatar::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0.3) 100%);
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.03em;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .headline {
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.02em;
            margin-bottom: 24px;
            font-style: italic; 
        }

        /* Tatanan Tombol */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            border-radius: 16px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.25s ease;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.08); 
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        
        .link-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .link-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            filter: brightness(1.15);
        }

        /* Warna Tombol */
        .btn-wa { background: rgba(37, 211, 102, 0.9); }
        .btn-ig { background: linear-gradient(45deg, rgba(240,148,51,0.9) 0%, rgba(220,39,67,0.9) 50%, rgba(188,24,136,0.9) 100%); }
        .btn-tiktok { background: rgba(0, 0, 0, 0.8); border: 1px solid rgba(255,255,255,0.15); }
        .btn-maps { background: rgba(234, 67, 53, 0.9); }

    </style>
</head>

    <script>
        const card = document.getElementById('tilt-card');
        const container = document.body;

        function handleMove(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const w = container.clientWidth;
            const h = container.clientHeight;
            
            const yValue = (clientX / w - 0.5) * 2;
            const xValue = (clientY / h - 0.5) * 2;
            
            const rotateX = xValue * 12; 
            const rotateY = yValue * 18; 
            
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        }

        function handleReset() {
            card.style.transform = `rotateX(0deg) rotateY(0deg)`;
        }

        container.addEventListener('touchmove', handleMove);
        container.addEventListener('touchend', handleReset);
        container.addEventListener('mousemove', handleMove);
        container.addEventListener('mouseleave', handleReset);
    </script>
