<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Digital | Jamil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #080b12; 
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            perspective: 1200px; 
            position: relative;
            overflow: hidden;
        }

        /* Grafis Awan Cahaya Latar Belakang */
        .bg-graphic {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 1; 
        }

        .bg-graphic::before {
            content: "";
            position: absolute;
            width: 300px; height: 300px;
            top: -100px; left: -100px;
            background-color: #06b6d4; 
            filter: blur(120px); 
            opacity: 0.15; 
        }

        .bg-graphic::after {
            content: "";
            position: absolute;
            width: 350px; height: 350px;
            bottom: -150px; right: -100px;
            background-color: #8b5cf6; 
            filter: blur(140px); 
            opacity: 0.18; 
        }

        /* Tekstur Film Grain */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4XiDAAAAUVBMVEV0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWR0ZWTr54g1AAAAGnRSTlMALv8A/v7/AP8A/wD+/v7+AP8A/gD+/v7+AP8A8mD2MwAAAClJREFUeNpjYGRkZGJmYWVjZ2dkYmZhpWJkYmZhpWJmYWVjZ2NkYmYAABMAAmf8WNoAAAAASUVORK5CYII=');
            opacity: 0.03; 
            pointer-events: none;
            z-index: 2; 
        }

        /* Kartu Utama */
        .profile-card {
            width: 100%;
            max-width: 380px;
            background: var(--card-bg);
            border-radius: 28px; 
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
            z-index: 3; 
            position: relative;
            transform-style: preserve-3d;
            will-change: transform;
            transition: transform 0.1s ease-out; 
        }

        /* Avatar */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #475569, #1e293b);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            font-weight: 700;
            color: #f1f5f9;
            letter-spacing: -2px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            position: relative;
            border: 2px solid rgba(255,255,255,0.05);
        }
        
        .avatar::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 50%, rgba(0,0,0,0.4) 100%);
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.03em;
        }

        .headline {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.02em;
            margin-bottom: 24px;
            font-style: italic; 
        }

        /* Tombol Tautan */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            border-radius: 16px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s ease;
            color: #ffffff;
            border: none;
            position: relative;
            overflow: hidden;
        }
        
        .link-btn::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg);
            transition: all 0.3s ease;
            opacity: 0;
        }

        .link-btn:hover::after {
            opacity: 1;
            transform: rotate(45deg) translate(10%, 10%);
        }

        .link-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .link-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.4);
            filter: brightness(1.1);
        }

        /* Warna Merek */
        .btn-wa { background: #25D366; }
        .btn-ig { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .btn-tiktok { background: #000000; border: 1px solid rgba(255,255,255,0.1); }
        .btn-maps { background: #EA4335; }

    </style>
</head>
